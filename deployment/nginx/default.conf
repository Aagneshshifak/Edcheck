# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse proxy config for Edcheck backend
# Domain  : edcheck.pinmypic.online
# Backend : http://localhost:5001 (Node.js / Express via PM2)
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name edcheck.pinmypic.online;

    # Let Certbot handle ACME challenges for SSL renewal
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name edcheck.pinmypic.online;

    # ── SSL certificates (managed by Certbot) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/edcheck.pinmypic.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edcheck.pinmypic.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Request body size (10 MB — matches Express json limit) ───────────────
    client_max_body_size 10M;

    # ── Timeouts (generous for SSE / long-running AI requests) ───────────────
    proxy_read_timeout    3600s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    3600s;

    # ── Common proxy headers ──────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── SSE / EventSource — disable buffering so events stream immediately ────
    location /Notifications/stream/ {
        proxy_pass         http://localhost:5001;
        proxy_http_version 1.1;

        # Disable nginx response buffering for SSE
        proxy_buffering    off;
        proxy_cache        off;

        # Keep the connection alive
        proxy_set_header Connection '';
        chunked_transfer_encoding on;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket upgrade support ─────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── All other requests → Express backend ─────────────────────────────────
    location / {
        proxy_pass         http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
